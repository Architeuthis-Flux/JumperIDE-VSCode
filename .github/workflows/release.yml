name: Release

# Two ways to ship:
#
# 1. **Automatic (recommended)** — Actions → Release → Run workflow.
#    Chooses patch/minor/major, bumps package.json, commits to main,
#    creates tag vX.Y.Z, builds the .vsix, attaches it to a GitHub Release
#    (marked latest), and publishes to VS Marketplace / Open VSX when tokens
#    are configured.
#
# 2. **Manual tag** — bump version + CHANGELOG locally, then:
#      git tag v0.1.0 && git push origin v0.1.0
#    Tag must match package.json. Same build + release + publish steps run.
#
# Secrets (optional, for marketplace publish):
#   VSCE_PAT : Azure DevOps PAT with Marketplace > Manage scope
#   OVSX_PAT : Open VSX access token (https://open-vsx.org)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      bump:
        description: Semver bump (workflow_dispatch only)
        type: choice
        options:
          - patch
          - minor
          - major
        default: patch

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      VSCE_PAT: ${{ secrets.VSCE_PAT }}
      OVSX_PAT: ${{ secrets.OVSX_PAT }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          # The bump step pushes the version commit + tag back to main
          persist-credentials: true

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Bump version, commit, and tag
        if: github.event_name == 'workflow_dispatch'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          npm version "${{ inputs.bump }}" -m "Release v%s"
          git push origin HEAD:main --follow-tags

      - name: Resolve version
        id: ver
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          TAG="v${VERSION}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "Resolved ${TAG} (package.json ${VERSION})"

      - name: Verify tag matches package.json version
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "${{ steps.ver.outputs.version }}" != "$TAG_VERSION" ]; then
            echo "::error::Tag $GITHUB_REF_NAME does not match package.json version ${{ steps.ver.outputs.version }}"
            exit 1
          fi

      - name: Typecheck
        run: npx tsc --noEmit

      # Builds dist/, syncs stubs from JumperlOS (falls back to GitHub raw in
      # CI), and produces jumperide-<version>.vsix.
      - name: Package
        run: npm run package

      - name: Upload .vsix artifact
        uses: actions/upload-artifact@v7
        with:
          name: jumperide-vsix-${{ steps.ver.outputs.version }}
          path: jumperide-*.vsix
          if-no-files-found: error

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ steps.ver.outputs.version }}"
          TAG="${{ steps.ver.outputs.tag }}"
          VSIX="jumperide-${VERSION}.vsix"

          if [ ! -f "$VSIX" ]; then
            echo "::error::Expected $VSIX after packaging"
            exit 1
          fi

          # Pull this version's section out of CHANGELOG.md (if present)
          awk -v ver="$VERSION" '
            $0 ~ "^## \\[" ver "\\]" { found=1; next }
            /^## / && found { exit }
            found { print }
          ' CHANGELOG.md > release-notes.md || true

          if [ ! -s release-notes.md ]; then
            echo "Release ${VERSION}." > release-notes.md
            echo "" >> release-notes.md
            echo "See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/${TAG}/CHANGELOG.md) for details." >> release-notes.md
          fi

          cat >> release-notes.md <<EOF

          ## Installation

          Download \`${VSIX}\` from the assets below, then either:

          **From the UI** — open the Extensions view, click the \`...\` menu in
          its title bar, choose **Install from VSIX...**, and pick the
          downloaded file.

          **From the command line:**

          \`\`\`sh
          code --install-extension ${VSIX}     # VS Code
          cursor --install-extension ${VSIX}   # Cursor
          codium --install-extension ${VSIX}   # VSCodium
          \`\`\`

          Then reload the window, plug in your Jumperless V5, and run
          **Jumperless: Connect** from the command palette.
          EOF

          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG exists — uploading latest .vsix"
            gh release upload "$TAG" "$VSIX" --clobber
            gh release edit "$TAG" --notes-file release-notes.md --latest
          else
            gh release create "$TAG" "$VSIX" \
              --title "JumperIDE ${VERSION}" \
              --notes-file release-notes.md \
              --latest
          fi

      - name: Publish to VS Marketplace
        if: env.VSCE_PAT != ''
        run: npx vsce publish --packagePath jumperide-*.vsix --pat "$VSCE_PAT"

      - name: Publish to Open VSX
        if: env.OVSX_PAT != ''
        run: npx --yes ovsx publish jumperide-*.vsix --pat "$OVSX_PAT"
