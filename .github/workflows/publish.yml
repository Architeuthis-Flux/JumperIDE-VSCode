name: Publish

# Publishes the extension to the VS Marketplace and Open VSX (the registry
# Cursor / VSCodium use) when a version tag is pushed, e.g. `git tag v0.1.0 &&
# git push --tags`. Can also be triggered manually. Each registry is published
# only if its token secret is configured:
#   - VSCE_PAT  : Azure DevOps PAT with Marketplace > Manage scope
#   - OVSX_PAT  : Open VSX access token (https://open-vsx.org)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      VSCE_PAT: ${{ secrets.VSCE_PAT }}
      OVSX_PAT: ${{ secrets.OVSX_PAT }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      # Builds dist/, syncs stubs from JumperlOS (falls back to GitHub raw in
      # CI), and produces jumperide-<version>.vsix.
      - name: Package
        run: npm run package

      - name: Publish to VS Marketplace
        if: env.VSCE_PAT != ''
        run: npx vsce publish --packagePath jumperide-*.vsix --pat "$VSCE_PAT"

      - name: Publish to Open VSX
        if: env.OVSX_PAT != ''
        run: npx --yes ovsx publish jumperide-*.vsix --pat "$OVSX_PAT"

      - name: Upload .vsix artifact
        uses: actions/upload-artifact@v4
        with:
          name: jumperide-vsix
          path: jumperide-*.vsix
